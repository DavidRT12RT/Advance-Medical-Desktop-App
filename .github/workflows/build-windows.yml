name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run make
        env:
          # URL del servidor de IA central; se embebe en el build.
          # Definir en Settings > Secrets and variables > Actions > Variables.
          # Si no está definida, la app usa http://localhost:8000.
          VITE_API_SERVER_URL: ${{ vars.VITE_API_SERVER_URL }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIM-Desktop-Setup-windows
          path: |
            out/make/squirrel.windows/**/*.exe
            out/make/squirrel.windows/**/*.nupkg
            out/make/squirrel.windows/**/RELEASES
          if-no-files-found: error
